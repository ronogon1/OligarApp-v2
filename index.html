<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OligarApp v2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"

  <link rel="stylesheet" href="css/styles.css">

      <div class="brand-logos">

          src="assets/logos/logo_oligar_crochet.png"

        <img
          src="assets/logos/logo_oligar_creaciones.png"

          class="logo-secundario"
        >
      </div>
    </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
