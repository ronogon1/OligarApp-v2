<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OligarApp v2</title>

  <link rel="icon" type="image/png" sizes="128x128" href="assets/icons/Icono Oligar (128x128).png">
  <link rel="icon" type="image/png" sizes="180x180" href="assets/icons/Icono Oligar (180x180).png">
  <link rel="icon" type="image/png" sizes="256x256" href="assets/icons/Icono Oligar (256x256).png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  
  <div id="loginView" class="view active">
    <div class="login-container">
      <h2>Iniciar sesión</h2>

      <input type="email" id="email" placeholder="Correo electrónico">
      <input type="password" id="password" placeholder="Contraseña">

      <button id="btnLogin">Ingresar</button>

      <p id="loginError" class="error"></p>
    </div>
  </div>

  <div id="appView" class="view">
    <h2>Bienvenido</h2>
    <p id="userEmail"></p>
    <button id="btnLogout">Cerrar sesión</button>
  </div>
  
  <main class="app-shell">
    <section class="welcome-card">
      <img
        src="assets/logos/logo_oligar.jpg"
        alt="Logo principal de Oligar"
        class="logo-principal"
      >

      <h1>OligarApp v2</h1>
      <p class="subtitle">Base inicial del nuevo sistema</p>

      <div class="brand-logos">
        <img
          src="assets/logos/logo_oligar_crochet.png"
          alt="Logo Oligar Crochet"
          class="logo-secundario"
        >
        <img
          src="assets/logos/logo_oligar_creaciones.png"
          alt="Logo Oligar Creaciones"
          class="logo-secundario"
        >
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
