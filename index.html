<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OligarApp v2</title>

  <link rel="icon" type="image/png" sizes="128x128" href="assets/icons/Icono Oligar light (128x128).png">
  <link rel="icon" type="image/png" sizes="180x180" href="assets/icons/Icono Oligar light (180x180).png">
  <link rel="icon" type="image/png" sizes="256x256" href="assets/icons/Icono Oligar light (256x256).png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/Icono Oligar light (512x512).png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/Icono Oligar light (180x180).png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="loginView" class="view active">
    <div class="login-container">
      <img
        src="assets/logos/logo_oligar.jpg"
        alt="Logo principal de Oligar"
        class="login-logo"
      >

      <h2>Iniciar sesión</h2>

      <input type="email" id="email" placeholder="Correo electrónico">
      <input type="password" id="password" placeholder="Contraseña">

      <button id="btnLogin" class="btn-primary">Ingresar</button>

      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="view hidden">
    <header class="app-header">
      <div class="app-brand">
        
        <img
          src="assets/icons/Icono Oligar light (512x512).png"
          alt="Icono de App Oligar"
          class="app-header-logo"
        >
        <span class="app-title">OligarApp v2.0</span>
      </div>

      <div class="active-section-indicator" id="activeSectionLabel">
        Inicio
      </div>

      <div class="user-info">
        <span id="userEmail"></span>
        <button id="btnMenuToggle" class="btn-menu" type="button">Menú</button>
        <button id="btnLogout" class="btn-logout" type="button">Salir</button>
      </div>
    </header>

    <div id="mobileMenu" class="mobile-menu hidden">
      <button class="mobile-menu-btn" data-view="homeView" type="button">Inicio</button>
      <button class="mobile-menu-btn" data-view="ventaView" type="button">Nueva venta</button>
      <button class="mobile-menu-btn" type="button" disabled>Compras</button>
      <button class="mobile-menu-btn" type="button" disabled>Facturas</button>
      <button class="mobile-menu-btn" type="button" disabled>Clientes</button>
      <button class="mobile-menu-btn" type="button" disabled>Reportes</button>
      <button class="mobile-menu-btn" type="button" disabled>Consultas</button>
    </div>

    <main class="app-content">
      <!-- INICIO -->
      <section id="homeView" class="app-section active-section">
        <section class="welcome-card">
          <img
            src="assets/logos/logo_oligar.jpg"
            alt="Logo principal de Oligar"
            class="logo-principal"
          >

          <h1>OligarApp v2</h1>
          <p class="subtitle">Base inicial del nuevo sistema</p>

          <div class="brand-logos">
            <img
              src="assets/logos/logo_oligar_crochet.png"
              alt="Logo Oligar Crochet"
              class="logo-secundario"
            >
            <img
              src="assets/logos/logo_oligar_creaciones.png"
              alt="Logo Oligar Creaciones"
              class="logo-secundario"
            >
          </div>
        </section>
      </section>

      <!-- NUEVA VENTA -->
      <section id="ventaView" class="app-section">
        <section class="module-card">
          <div class="module-header module-header-flex">
            </div>
              <h2>Registro de venta</h2>
            </div>

            <button type="button" id="btnLimpiarVenta" class="btn-clear-form">
              Limpiar formulario
            </button>
          <div>

          <div class="venta-grid">
            <div class="field-group autocomplete-group">
              <label for="clienteVenta">Nombre del cliente</label>
              <input
                type="text"
                id="clienteVenta"
                placeholder="Escribe el nombre del cliente"
                autocomplete="off"
              >
              <div id="clienteSuggestions" class="suggestions hidden"></div>
            </div>

            <div class="field-group">
              <label for="fechaVenta">Fecha</label>
              <input type="date" id="fechaVenta">
            </div>
          </div>

          <div class="module-subcard">
            <h3>Origen</h3>

            <div class="origen-buttons">
              <button
                type="button"
                class="origin-btn origin-logo-btn active-origin"
                data-origin="CRE"
              >
                <img
                  src="assets/logos/logo_oligar_creaciones.png"
                  alt="Origen Creaciones"
                  class="origin-logo"
                >
              </button>

              <button
                type="button"
                class="origin-btn origin-logo-btn"
                data-origin="CRO"
              >
                <img
                  src="assets/logos/logo_oligar_crochet.png"
                  alt="Origen Crochet"
                  class="origin-logo"
                >
              </button>
            </div>

            <p class="helper-text">
              El origen definirá la línea de negocio de la factura.
            </p>
          </div>

          <div class="module-subcard">
            <h3>Productos</h3>
            <div id="productosContainer" class="dynamic-list"></div>
            <button type="button" id="btnAddProducto" class="btn-secondary-soft">
              + Añadir producto
            </button>
          </div>

          <div class="venta-grid">
            <div class="field-group">
              <label for="envioVenta">Envío (C$)</label>
              <input type="number" id="envioVenta" value="0" min="0" step="0.01">
            </div>

            <div class="field-group">
              <label for="descVenta">Desc. global (C$)</label>
              <input type="number" id="descVenta" value="0" min="0" step="0.01">
            </div>
          </div>

          <div class="module-subcard">
            <h3>Pagos</h3>
            <div id="pagosContainer" class="dynamic-list"></div>
            <button type="button" id="btnAddPago" class="btn-secondary-soft">
              + Agregar pago
            </button>
          </div>

          <div class="summary-card">
            <div class="summary-row">
              <span>Subtotal</span>
              <strong id="subtotalResumen">C$ 0.00</strong>
            </div>
            <div class="summary-row">
              <span>Total</span>
              <strong id="totalResumen">C$ 0.00</strong>
            </div>
            <div class="summary-row">
              <span>Pagado</span>
              <strong id="pagadoResumen">C$ 0.00</strong>
            </div>
            <div class="summary-row total-row">
              <span>Saldo pendiente</span>
              <strong id="saldoResumen">C$ 0.00</strong>
            </div>
          </div>

          <div class="module-actions">
            <button type="button" class="btn-primary-wide">
              Guardar venta e imprimir factura
            </button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
